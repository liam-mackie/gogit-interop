name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:


jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Run make generate once; all downstream jobs download the result
  # ─────────────────────────────────────────────────────────────────────────────

  generate:
    name: Generate code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate code
        run: make generate

      - uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: |
            shared/
            dotnet/GoGitDotNet/

  # ─────────────────────────────────────────────────────────────────────────────
  # Build + test on each native platform, then upload the compiled native lib
  # ─────────────────────────────────────────────────────────────────────────────

  build-test-macos-arm64:
    name: Build & Test (macOS ARM64)
    needs: generate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build native library
        run: make build-darwin-arm64

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run tests
        run: cd dotnet && dotnet test GoGitDotNet.Tests/GoGitDotNet.Tests.csproj --configuration Release --logger "console;verbosity=normal"

      - uses: actions/upload-artifact@v4
        with:
          name: native-osx-arm64
          path: runtimes/osx-arm64/native/libgogit.dylib

  build-test-macos-amd64:
    name: Build & Test (macOS AMD64)
    needs: generate
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build native library
        run: make build-darwin-amd64

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run tests
        run: cd dotnet && dotnet test GoGitDotNet.Tests/GoGitDotNet.Tests.csproj --configuration Release --logger "console;verbosity=normal"

      - uses: actions/upload-artifact@v4
        with:
          name: native-osx-x64
          path: runtimes/osx-x64/native/libgogit.dylib

  build-test-linux-amd64:
    name: Build & Test (Linux AMD64)
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install musl cross-compiler
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build native library
        run: make build-linux-amd64

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run tests
        run: cd dotnet && dotnet test GoGitDotNet.Tests/GoGitDotNet.Tests.csproj --configuration Release --logger "console;verbosity=normal"

      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: runtimes/linux-x64/native/libgogit.so

  # Windows: cross-compile from Ubuntu (mingw-w64), then test on a Windows runner
  build-windows-amd64:
    name: Build (Windows AMD64)
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install mingw-w64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Build native library
        run: make build-windows-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: runtimes/win-x64/native/libgogit.dll

  test-windows-amd64:
    name: Test (Windows AMD64)
    needs: build-windows-amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: runtimes/win-x64/native/

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run tests
        run: cd dotnet && dotnet test GoGitDotNet.Tests/GoGitDotNet.Tests.csproj --configuration Release --logger "console;verbosity=normal"

  # ─────────────────────────────────────────────────────────────────────────────
  # Pack: assemble all native libs into a single NuGet package
  # ─────────────────────────────────────────────────────────────────────────────

  pack:
    name: Pack NuGet
    needs:
      - build-test-macos-arm64
      - build-test-macos-amd64
      - build-test-linux-amd64
      - test-windows-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: runtimes/osx-arm64/native/

      - uses: actions/download-artifact@v4
        with:
          name: native-osx-x64
          path: runtimes/osx-x64/native/

      - uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: runtimes/linux-x64/native/

      - uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: runtimes/win-x64/native/

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Strip leading 'v' from tag name (e.g. v1.2.3 → 1.2.3)
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-ci.$(date +%Y%m%d%H%M%S)+${{ github.sha }}"
            VERSION="${VERSION:0:50}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: cd dotnet && dotnet pack GoGitDotNet/GoGitDotNet.csproj --configuration Release /p:Version=${{ steps.version.outputs.version }} --output ../dist/

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: dist/*.nupkg

      - name: Publish to NuGet.org
        if: github.event_name == 'release'
        run: dotnet nuget push dist/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
